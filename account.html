<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Islamic Book Store — Account</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<header class="header">
  <div class="container nav">
    <a class="brand" href="index.html"><span class="logo">📚</span><span>Islamic Book Store<small>Account</small></span></a>
    <nav class="nav-links">
      <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html">Blog</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="faq.html">FAQ</a>
    </nav>
    <div class="nav-actions">
      <a class="btn cart-badge" href="cart.html" data-count="0">Cart</a>
      <a class="btn primary" href="shop.html">Shop</a>
      <label class="btn menu-btn" for="menuToggle">Menu</label>
    </div>
  </div>
  <input id="menuToggle" type="checkbox" />
  <div class="menu-panel"><div class="container">
    <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="blog.html">Blog</a><a href="about.html">About</a><a href="contact.html">Contact</a><a href="faq.html">FAQ</a><a href="cart.html">Cart</a>
  </div></div>
</header>

<main>
  <section class="page-head">
    <div class="container">
      <div class="breadcrumb">Home / Account</div>
      <h1>Login / Register</h1>
      <div class="muted">Frontend UI only — connect to backend later.</div>
    </div>
  </section>

  <section class="section">
    <div class="container" style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
      <form class="card pad">
        <h3 style="margin:0 0 10px;">Login</h3>
        <div class="field"><label>Email</label><input class="input" placeholder="name@email.com"></div>
        <div class="field"><label>Password</label><input class="input" type="password" placeholder="••••••••"></div>
        <button class="btn primary" type="button">Login</button>
        <div class="muted" style="font-size:12px; margin-top:10px;">Forgot password link can be added later.</div>
      </form>

      <form class="card pad">
        <h3 style="margin:0 0 10px;">Register</h3>
        <div class="row">
          <div class="field"><label>First name</label><input class="input" placeholder="Ahmad"></div>
          <div class="field"><label>Last name</label><input class="input" placeholder="R."></div>
        </div>
        <div class="field"><label>Email</label><input class="input" placeholder="name@email.com"></div>
        <div class="field"><label>Password</label><input class="input" type="password" placeholder="Create password"></div>
        <button class="btn" type="button">Create account</button>
      </form>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container" style="display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;">
    <span class="muted">© 2026 Islamic Book Store.</span>
    <span class="muted"><a href="contact.html">Support</a></span>
  </div>
</footer>

<script src="js/store.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
